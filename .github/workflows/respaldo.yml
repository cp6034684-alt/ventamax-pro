name: Respaldo BD (cada hora)

on:
  schedule:
    - cron: '0 * * * *'      # cada hora en punto (UTC)
  workflow_dispatch: {}        # permite ejecutarlo manualmente desde GitHub

jobs:
  respaldo:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar cliente de PostgreSQL
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Generar respaldo cifrado
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_PASSWORD: ${{ secrets.BACKUP_PASSWORD }}
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$BACKUP_PASSWORD" ]; then
            echo "Faltan los secrets DATABASE_URL y/o BACKUP_PASSWORD en el repositorio."
            exit 1
          fi
          TS=$(date -u +'%Y-%m-%d_%H%M')
          echo "Generando respaldo $TS ..."
          pg_dump "$DATABASE_URL" --no-owner --no-privileges \
            | gzip \
            | openssl enc -aes-256-cbc -pbkdf2 -salt -pass pass:"$BACKUP_PASSWORD" \
              -out "respaldo_${TS}.sql.gz.enc"
          ls -lh respaldo_*.enc

      - name: Guardar respaldo (artefacto seguro)
        uses: actions/upload-artifact@v4
        with:
          name: respaldo-${{ github.run_id }}
          path: respaldo_*.sql.gz.enc
          retention-days: 14
