name: Respaldo BD (cada hora)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  respaldo:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar PostgreSQL client 17
        run: |
          set -e
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          pg_dump --version

      - name: Generar respaldo cifrado
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_PASSWORD: ${{ secrets.BACKUP_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ] || [ -z "${BACKUP_PASSWORD:-}" ]; then
            echo "Faltan los secrets DATABASE_URL y/o BACKUP_PASSWORD."; exit 1
          fi
          TS=$(date -u +'%Y-%m-%d_%H%M')
          pg_dump "$DATABASE_URL" --no-owner --no-privileges > dump.sql
          BYTES=$(wc -c < dump.sql)
          echo "Tamano del dump: ${BYTES} bytes"
          if [ "$BYTES" -lt 1000 ]; then echo "Respaldo demasiado pequeno/vacio, abortando."; exit 1; fi
          gzip -c dump.sql | openssl enc -aes-256-cbc -pbkdf2 -salt -pass pass:"$BACKUP_PASSWORD" -out "respaldo_${TS}.sql.gz.enc"
          rm -f dump.sql
          ls -lh respaldo_*.enc

      - name: Guardar respaldo (artefacto seguro)
        uses: actions/upload-artifact@v4
        with:
          name: respaldo-${{ github.run_id }}
          path: respaldo_*.sql.gz.enc
          retention-days: 14
