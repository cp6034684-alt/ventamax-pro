name: Resumen a supervisores (10am, 12m, 4pm)

# Horario Colombia (UTC-5): 10:00am, 12:00m, 4:00pm  ->  15:00, 17:00, 21:00 UTC
on:
  schedule:
    - cron: '0 15,17,21 * * *'
  workflow_dispatch: {}

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar resumen a los supervisores
        run: |
          curl -fsS -X POST "$API_BASE/notificaciones/resumen-supervisores" \
            -H "x-import-token: $IMPORT_TOKEN" \
            -H "content-type: application/json"
        env:
          API_BASE: ${{ secrets.API_BASE }}
          IMPORT_TOKEN: ${{ secrets.IMPORT_TOKEN }}
