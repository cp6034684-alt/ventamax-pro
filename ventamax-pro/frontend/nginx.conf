server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: cualquier ruta sirve index.html
  location / { try_files $uri /index.html; }

  # Proxy al backend dentro de la red de Docker
  location /api/ {
    proxy_pass http://backend:4000/api/;
    proxy_set_header Host $host;
  }
}
