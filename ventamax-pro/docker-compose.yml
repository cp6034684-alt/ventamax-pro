# Levanta todo el sistema con: docker compose up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ventamax
      POSTGRES_PASSWORD: ventamax
      POSTGRES_DB: ventamax
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ventamax"]
      interval: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://ventamax:ventamax@db:5432/ventamax?schema=public
      JWT_SECRET: ${JWT_SECRET:-cambia-este-secreto-en-produccion}
      CORS_ORIGIN: http://localhost:8080,http://localhost:5173
      PORT: 4000
      TZ: America/Bogota
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
